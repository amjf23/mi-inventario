// ── Export / Import ───────────────────────────────────────────────────────────

function exportToExcel(items) {
  const esc = v => String(v??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  const cell = v => `<Cell><Data ss:Type="String">${esc(v)}</Data></Cell>`;
  const row  = cells => `<Row>${cells.map(cell).join('')}</Row>`;
  const sheets = {
    libros: { label:'Libros',        headers:['Titulo','Autor','Saga','Tomo','Saga completa','Tematica','Estado','Ubicacion','Favorito','Anno','Precio','Notas'],
      fn: i => [i.title,i.author,i.saga,i.tomo,i.sagaComplete?'Si':'No',i.genre,i.state,i.location,i.favorite?'Si':'No',i.year,i.price,i.notes] },
    juegos: { label:'Juegos',        headers:['Titulo','Saga','Consola','Estado','Ubicacion','Favorito','Anno','Precio','Notas'],
      fn: i => [i.title,i.saga,i.console,i.state,i.location,i.favorite?'Si':'No',i.year,i.price,i.notes] },
    dvds:   { label:'DVDs-Blu-rays', headers:['Titulo','Tipo','Genero','Serie completa','Estado','Ubicacion','Favorito','Anno','Precio','Notas'],
      fn: i => [i.title,i.mediaType,i.dvdGenre,i.seriesComplete?'Si':'No',i.state,i.location,i.favorite?'Si':'No',i.year,i.price,i.notes] },
    musica: { label:'Musica',        headers:['Titulo','Artista','Album','Formato','Genero','Ubicacion','Favorito','Anno','Notas'],
      fn: i => [i.title,i.artist,i.album,i.musicFormat,i.musicGenre,i.location,i.favorite?'Si':'No',i.year,i.notes] },
    varios: { label:'Varios',        headers:['Titulo','Tipo objeto','Estado','Ubicacion','Favorito','Anno','Precio','Notas'],
      fn: i => [i.title,i.itemType,i.state,i.location,i.favorite?'Si':'No',i.year,i.price,i.notes] },
  };
  const worksheets = Object.entries(sheets).map(([key,s]) => {
    const list = items.filter(i => i.category===key);
    if (!list.length) return '';
    const rows = [row(s.headers), ...list.map(i => row(s.fn(i)))].join('');
    return `<Worksheet ss:Name="${s.label}"><Table>${rows}</Table></Worksheet>`;
  }).join('');
  const xml = `<?xml version="1.0" encoding="UTF-8"?><?mso-application progid="Excel.Sheet"?><Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet" xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet">${worksheets}</Workbook>`;
  const blob = new Blob([xml], { type:'application/vnd.ms-excel;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download='mi_coleccion.xls'; a.click();
  URL.revokeObjectURL(url);
}

function exportToJSON(items) {
  const blob = new Blob([JSON.stringify(items,null,2)], { type:'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download='mi_coleccion_backup.json'; a.click();
  URL.revokeObjectURL(url);
}

function importFromJSON(file, onSuccess) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (Array.isArray(data)) onSuccess(data);
      else alert('Archivo no válido');
    } catch { alert('Error al leer el archivo'); }
  };
  reader.readAsText(file);
}

function FormModal({ item, t, onSave, onDelete, onClose }) {
  const [form, setForm] = useState({...item});
  const set = (k,v) => setForm(f => ({...f,[k]:v}));
  const cat = CATEGORIES[form.category];
  const isNew = !form.id;

  const handleCover = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => set('cover', ev.target.result);
    reader.readAsDataURL(file);
  };
  const handleCatChange = c => { set('category',c); set('state', STATES[c][0]||''); };
  const handleSubmit = () => {
    if (!form.title.trim()) { alert('El título es obligatorio'); return; }
    onSave({...form, state: form.state || STATES[form.category][0]||''});
  };

  return (
    <Overlay onClose={onClose}>
      <div style={{ background:t.surface,borderRadius:20,maxHeight:'92vh',overflowY:'auto' }}>
        <div style={{ display:'flex',alignItems:'center',justifyContent:'space-between',padding:'18px 20px 0' }}>
          <h2 style={{ fontFamily:"'Playfair Display',serif",fontSize:19,fontWeight:700 }}>{isNew?'Añadir objeto':'Editar'}</h2>
          <CloseBtn onClick={onClose} />
        </div>

        <div style={{ padding:'16px 20px 24px',display:'flex',flexDirection:'column',gap:14 }}>

          {/* Category */}
          <div>
            <Lbl t={t}>Categoría</Lbl>
            <div style={{ display:'flex',gap:8,flexWrap:'wrap' }}>
              {Object.entries(CATEGORIES).map(([k,v]) => (
                <button key={k} onClick={() => handleCatChange(k)}
                  style={{ padding:'6px 12px',borderRadius:20,border:`2px solid ${form.category===k?v.accent:t.border}`,background:form.category===k?v.accent:t.surface,color:form.category===k?'#fff':t.text2,fontSize:12,fontWeight:600,cursor:'pointer' }}>
                  {v.icon} {v.label}
                </button>
              ))}
            </div>
          </div>

          {/* Cover + title */}
          <div style={{ display:'flex',gap:14,alignItems:'flex-start' }}>
            <div>
              <Lbl t={t}>Portada</Lbl>
              <div onClick={() => document.getElementById('cover-inp').click()}
                style={{ width:76,height:108,borderRadius:8,border:`2px dashed ${t.border}`,background:t.bg2,overflow:'hidden',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center' }}>
                {form.cover ? <img src={form.cover} alt="" style={{ width:'100%',height:'100%',objectFit:'cover' }} /> : <span style={{ fontSize:26,opacity:0.5 }}>🖼️</span>}
              </div>
              <input id="cover-inp" type="file" accept="image/*" style={{ display:'none' }} onChange={handleCover} />
            </div>
            <div style={{ flex:1,display:'flex',flexDirection:'column',gap:10 }}>
              <div><Lbl t={t}>Título *</Lbl><Inp value={form.title} onChange={v => set('title',v)} placeholder="Título..." t={t} /></div>
              {form.category==='libros' && <div><Lbl t={t}>Autor</Lbl><Inp value={form.author} onChange={v => set('author',v)} placeholder="Autor..." t={t} /></div>}
              {form.category==='musica' && <div><Lbl t={t}>Artista</Lbl><Inp value={form.artist} onChange={v => set('artist',v)} placeholder="Artista..." t={t} /></div>}
              {form.category==='musica' && <div><Lbl t={t}>Álbum</Lbl><Inp value={form.album} onChange={v => set('album',v)} placeholder="Álbum..." t={t} /></div>}
              {(form.category==='libros'||form.category==='juegos') && <div><Lbl t={t}>Saga</Lbl><Inp value={form.saga} onChange={v => set('saga',v)} placeholder="Saga (opcional)..." t={t} /></div>}
            </div>
          </div>

          {/* Libros specific */}
          {form.category==='libros' && (
            <>
              {form.saga && (
                <>
                  <div style={{ display:'flex',gap:10 }}>
                    <div style={{ flex:1 }}><Lbl t={t}>Número de tomo</Lbl><Inp value={form.tomo} onChange={v => set('tomo',v)} placeholder="1" t={t} type="number" /></div>
                    <div style={{ flex:1,display:'flex',flexDirection:'column',justifyContent:'flex-end' }}>
                      <div style={{ display:'flex',alignItems:'center',gap:8,paddingBottom:2 }}>
                        <input type="checkbox" id="saga-complete" checked={form.sagaComplete} onChange={e => set('sagaComplete',e.target.checked)}
                          style={{ width:18,height:18,accentColor:cat.accent,cursor:'pointer' }} />
                        <label htmlFor="saga-complete" style={{ fontSize:13,cursor:'pointer' }}>Saga completa</label>
                      </div>
                    </div>
                  </div>
                </>
              )}
              <div><Lbl t={t}>Temática</Lbl><Inp value={form.genre} onChange={v => set('genre',v)} placeholder="Ej: Filosofía, Fantasía épica..." t={t} /></div>
            </>
          )}

          {/* Juegos specific */}
          {form.category==='juegos' && (
            <div><Lbl t={t}>Consola</Lbl><Sel value={form.console} onChange={v => set('console',v)} options={CONSOLAS} t={t} /></div>
          )}

          {/* DVDs specific */}
          {form.category==='dvds' && (
            <>
              <div>
                <Lbl t={t}>Tipo</Lbl>
                <div style={{ display:'flex',gap:8 }}>
                  {['Película','Serie'].map(tp => (
                    <button key={tp} onClick={() => set('mediaType',tp)}
                      style={{ flex:1,padding:'8px',borderRadius:10,border:`2px solid ${form.mediaType===tp?cat.accent:t.border}`,background:form.mediaType===tp?cat.accent:t.surface,color:form.mediaType===tp?'#fff':t.text2,fontSize:13,fontWeight:600,cursor:'pointer' }}>
                      {tp}
                    </button>
                  ))}
                </div>
              </div>
              {form.mediaType==='Serie' && (
                <div style={{ display:'flex',alignItems:'center',gap:10 }}>
                  <input type="checkbox" id="serie-complete" checked={form.seriesComplete} onChange={e => set('seriesComplete',e.target.checked)}
                    style={{ width:18,height:18,accentColor:cat.accent,cursor:'pointer' }} />
                  <label htmlFor="serie-complete" style={{ fontSize:14,cursor:'pointer' }}>Colección completa</label>
                </div>
              )}
              <div><Lbl t={t}>Género</Lbl><Sel value={form.dvdGenre} onChange={v => set('dvdGenre',v)} options={['', ...DVD_GENRES]} t={t} /></div>
            </>
          )}

          {/* Música specific */}
          {form.category==='musica' && (
            <>
              <div><Lbl t={t}>Formato</Lbl>
                <div style={{ display:'flex',gap:8 }}>
                  {MUSIC_FMTS.map(f => (
                    <button key={f} onClick={() => set('musicFormat',f)}
                      style={{ flex:1,padding:'8px',borderRadius:10,border:`2px solid ${form.musicFormat===f?cat.accent:t.border}`,background:form.musicFormat===f?cat.accent:t.surface,color:form.musicFormat===f?'#fff':t.text2,fontSize:13,fontWeight:600,cursor:'pointer' }}>
                      {f==='Vinilo'?'🎵 Vinilo':'💿 CD'}
                    </button>
                  ))}
                </div>
              </div>
              <div><Lbl t={t}>Género musical</Lbl><Sel value={form.musicGenre} onChange={v => set('musicGenre',v)} options={['', ...MUSIC_GENRES]} t={t} /></div>
            </>
          )}

          {/* Varios specific */}
          {form.category==='varios' && (
            <div><Lbl t={t}>Tipo de objeto</Lbl><Inp value={form.itemType} onChange={v => set('itemType',v)} placeholder="Ej: Figura, Cómic..." t={t} /></div>
          )}

          {/* Common: Estado (not for música) */}
          {form.category!=='musica' && (
            <div><Lbl t={t}>Estado</Lbl><Sel value={form.state} onChange={v => set('state',v)} options={STATES[form.category]} t={t} /></div>
          )}

          <div><Lbl t={t}>Ubicación</Lbl><Sel value={form.location} onChange={v => set('location',v)} options={['', ...LOCATIONS]} t={t} /></div>

          <div style={{ display:'flex',gap:10 }}>
            <div style={{ flex:1 }}><Lbl t={t}>Año adquisición</Lbl><Inp value={form.year} onChange={v => set('year',v)} placeholder="2024" t={t} type="number" /></div>
            {form.category!=='musica' && <div style={{ flex:1 }}><Lbl t={t}>Precio (€)</Lbl><Inp value={form.price} onChange={v => set('price',v)} placeholder="0" t={t} type="number" /></div>}
          </div>

          <div>
            <Lbl t={t}>Notas</Lbl>
            <textarea value={form.notes} onChange={e => set('notes',e.target.value)} placeholder="Cualquier anotación..."
              style={{ width:'100%',minHeight:76,padding:'10px 12px',borderRadius:10,border:`1.5px solid ${t.border}`,background:t.bg2,color:t.text,fontSize:14,resize:'vertical',outline:'none',fontFamily:"'Nunito',sans-serif" }} />
          </div>

          <div style={{ display:'flex',alignItems:'center',gap:10 }}>
            <input type="checkbox" id="fav-chk" checked={form.favorite} onChange={e => set('favorite',e.target.checked)}
              style={{ width:18,height:18,accentColor:'#f5c518',cursor:'pointer' }} />
            <label htmlFor="fav-chk" style={{ fontSize:14,cursor:'pointer' }}>⭐ Marcar como favorito</label>
          </div>

          <div style={{ display:'flex',gap:10,marginTop:4 }}>
            {!isNew && onDelete && (
              <button onClick={() => { if (window.confirm('¿Eliminar este objeto?')) onDelete(); }}
                style={{ padding:'11px 16px',borderRadius:12,border:'1.5px solid #e05555',background:'transparent',color:'#e05555',fontSize:14,fontWeight:600,cursor:'pointer' }}>
                🗑️
              </button>
            )}
            <button onClick={onClose} style={{ flex:1,padding:'11px',borderRadius:12,border:`1.5px solid ${t.border}`,background:'transparent',color:t.text2,fontSize:14,fontWeight:600,cursor:'pointer' }}>Cancelar</button>
            <button onClick={handleSubmit} style={{ flex:2,padding:'11px',borderRadius:12,border:'none',background:cat.accent,color:'#fff',fontSize:14,fontWeight:700,cursor:'pointer' }}>{isNew?'Añadir':'Guardar'}</button>
          </div>
        </div>
      </div>
    </Overlay>
  );
}

// ── Stats Modal ───────────────────────────────────────────────────────────────

function StatsModal({ items, t, onClose }) {
  const total = items.length;
  const favs  = items.filter(i => i.favorite).length;
  const spent = items.reduce((acc,i) => acc + parseFloat(i.price||0), 0);
  const byCat = Object.entries(CATEGORIES).map(([k,v]) => {
    const list = items.filter(i => i.category===k);
    return { ...v, key:k, count:list.length, states: (STATES[k]||[]).map(s => ({ s, n:list.filter(i => i.state===s).length })) };
  });
  return (
    <Overlay onClose={onClose}>
      <div style={{ background:t.surface,borderRadius:20,maxHeight:'88vh',overflowY:'auto' }}>
        <div style={{ display:'flex',alignItems:'center',justifyContent:'space-between',padding:'18px 20px' }}>
          <h2 style={{ fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:700 }}>Estadísticas</h2>
          <CloseBtn onClick={onClose} />
        </div>
        <div style={{ padding:'0 20px 24px',display:'flex',flexDirection:'column',gap:14 }}>
          <div style={{ display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10 }}>
            {[['Total','🗂️',total],['Favoritos','⭐',favs],['Gastado','💶',spent>0?`${spent.toFixed(0)}€`:'—']].map(([lbl,ico,val]) => (
              <div key={lbl} style={{ background:t.bg2,borderRadius:12,padding:'12px 8px',textAlign:'center' }}>
                <div style={{ fontSize:22 }}>{ico}</div>
                <div style={{ fontSize:20,fontWeight:700,marginTop:4 }}>{val}</div>
                <div style={{ fontSize:11,color:t.text2 }}>{lbl}</div>
              </div>
            ))}
          </div>
          {byCat.filter(c => c.count>0).map(cat => (
            <div key={cat.key} style={{ background:t.bg2,borderRadius:14,padding:14 }}>
              <div style={{ display:'flex',alignItems:'center',gap:8,marginBottom:10 }}>
                <span style={{ fontSize:20 }}>{cat.icon}</span>
                <span style={{ fontWeight:700,fontSize:15 }}>{cat.label}</span>
                <span style={{ marginLeft:'auto',background:cat.accent,color:'#fff',fontSize:12,fontWeight:700,padding:'2px 10px',borderRadius:20 }}>{cat.count}</span>
              </div>
              {cat.states.filter(s => s.n>0).map(({s,n}) => (
                <div key={s} style={{ display:'flex',alignItems:'center',gap:8,marginBottom:7 }}>
                  <div style={{ flex:1,height:8,background:t.border,borderRadius:4,overflow:'hidden' }}>
                    <div style={{ height:'100%',width:`${(n/cat.count)*100}%`,background:cat.accent,borderRadius:4 }} />
                  </div>
                  <span style={{ fontSize:12,color:t.text2,minWidth:90,textAlign:'right' }}>{s}: {n}</span>
                </div>
              ))}
            </div>
          ))}
        </div>
      </div>
    </Overlay>
  );
}

// ── Data Modal ────────────────────────────────────────────────────────────────

function DataModal({ items, t, onExcelExport, onJSONExport, onImport, onClose }) {
  const fileRef = useRef(null);
  return (
    <Overlay onClose={onClose}>
      <div style={{ background:t.surface,borderRadius:20,overflow:'hidden' }}>
        <div style={{ display:'flex',alignItems:'center',justifyContent:'space-between',padding:'18px 20px' }}>
          <h2 style={{ fontFamily:"'Playfair Display',serif",fontSize:19,fontWeight:700 }}>Datos</h2>
          <CloseBtn onClick={onClose} />
        </div>
        <div style={{ padding:'0 20px 24px',display:'flex',flexDirection:'column',gap:12 }}>
          <p style={{ fontSize:13,color:t.text2 }}>{items.length} objetos en tu colección</p>
          <button onClick={onExcelExport}
            style={{ padding:'13px',borderRadius:12,border:'none',background:'#1d6f42',color:'#fff',fontSize:14,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:8 }}>
            📊 Exportar a Excel (.xls)
          </button>
          <button onClick={onJSONExport}
            style={{ padding:'13px',borderRadius:12,border:`1.5px solid ${t.border}`,background:t.bg2,color:t.text,fontSize:14,fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:8 }}>
            💾 Exportar copia de seguridad (.json)
          </button>
          <div style={{ borderTop:`1px solid ${t.border}`,paddingTop:12,marginTop:4 }}>
            <p style={{ fontSize:12,color:t.text2,marginBottom:10 }}>Importar desde copia de seguridad JSON (reemplaza los datos actuales):</p>
            <button onClick={() => fileRef.current && fileRef.current.click()}
              style={{ width:'100%',padding:'13px',borderRadius:12,border:`2px dashed ${t.border}`,background:'transparent',color:t.text2,fontSize:14,fontWeight:600,cursor:'pointer' }}>
              📂 Seleccionar archivo .json
            </button>
            <input ref={fileRef} type="file" accept=".json" style={{ display:'none' }} onChange={e => { if(e.target.files[0]) onImport(e.target.files[0]); }} />
          </div>
        </div>
      </div>
    </Overlay>
  );
}

// ── Main App ──────────────────────────────────────────────────────────────────

function App() {
  const [dark, setDark] = useState(() => {
    const s = localStorage.getItem('inv_dark');
    return s !== null ? JSON.parse(s) : window.matchMedia('(prefers-color-scheme: dark)').matches;
  });
  const toggleDark = () => setDark(d => { localStorage.setItem('inv_dark', !d); return !d; });

  const [items, setItems]         = useState([]);
  const [loading, setLoading]     = useState(true);

  useEffect(() => {
    window.loadItemsFromDB().then(data => {
      setItems(data);
      setLoading(false);
    });
  }, []);
  const [tab, setTab]             = useState('all');
  const [librosView, setLibrosView] = useState('grid'); // 'grid' | 'sagas'
  const [search, setSearch]       = useState('');
  const [filterState, setFilterState] = useState('all');
  const [modal, setModal]         = useState(null);
  const [editItem, setEditItem]   = useState(null);
  const [statsOpen, setStatsOpen] = useState(false);
  const [dataOpen, setDataOpen]   = useState(false);
  const [sagaModal, setSagaModal] = useState(null); // saga name

  const prevItemsRef = useRef(null);
  useEffect(() => {
    if (prevItemsRef.current === null) { prevItemsRef.current = items; return; }
    const prev = prevItemsRef.current;
    // Save new/updated items
    items.forEach(item => {
      const old = prev.find(i => i.id === item.id);
      if (!old || JSON.stringify(old) !== JSON.stringify(item)) window.saveItemToDB(item);
    });
    // Delete removed items
    prev.forEach(item => {
      if (!items.find(i => i.id === item.id)) window.deleteItemFromDB(item.id);
    });
    prevItemsRef.current = items;
  }, [items]);

  const t = dark ? themes.dark : themes.light;

  const stateOptions = tab==='all'
    ? [...new Set(Object.values(STATES).flat())]
    : STATES[tab] || [];

  const filtered = useMemo(() => {
    let list = items;
    if (tab!=='all') list = list.filter(i => i.category===tab);
    if (filterState!=='all') list = list.filter(i => i.state===filterState);
    if (search.trim()) {
      const q = search.toLowerCase();
      list = list.filter(i =>
        i.title.toLowerCase().includes(q) ||
        (i.author||'').toLowerCase().includes(q) ||
        (i.artist||'').toLowerCase().includes(q) ||
        (i.saga||'').toLowerCase().includes(q) ||
        (i.genre||'').toLowerCase().includes(q) ||
        (i.itemType||'').toLowerCase().includes(q) ||
        (i.location||'').toLowerCase().includes(q)
      );
    }
    return [...list].sort((a,b) => (b.favorite?1:0)-(a.favorite?1:0));
  }, [items, tab, filterState, search]);

  // Sagas grouping (only for libros with saga)
  const sagasMap = useMemo(() => {
    const books = items.filter(i => i.category==='libros' && i.saga);
    const map = {};
    books.forEach(b => { if (!map[b.saga]) map[b.saga]=[]; map[b.saga].push(b); });
    return map;
  }, [items]);

  const saveItem = item => {
    if (item.id) setItems(prev => prev.map(i => i.id===item.id ? item : i));
    else setItems(prev => [...prev, {...item, id:uid()}]);
    setModal(null); setEditItem(null);
  };
  const deleteItem = id => { setItems(prev => prev.filter(i => i.id!==id)); setModal(null); setEditItem(null); };
  const toggleFav  = id => setItems(prev => prev.map(i => i.id===id ? {...i,favorite:!i.favorite} : i));

  const sagaBooks = sagaModal ? (sagasMap[sagaModal]||[]) : [];

  return (
    <div style={{ minHeight:'100vh',background:t.bg,color:t.text,fontFamily:"'Nunito',sans-serif",transition:'background 0.3s,color 0.3s' }}>
      <style>{[
        "@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Nunito:wght@300;400;500;600;700&display=swap');",
        "*{box-sizing:border-box;margin:0;padding:0;}",
        "::-webkit-scrollbar{width:5px;}",
        `::-webkit-scrollbar-thumb{background:${t.border};border-radius:4px;}`,
        "input,textarea,select,button{font-family:'Nunito',sans-serif;}",
      ].join('\n')}</style>

      {loading && (
        <div style={{ position:'fixed',inset:0,background:t.bg,zIndex:300,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:16 }}>
          <div style={{ fontSize:48 }}>📚</div>
          <p style={{ fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:700 }}>Cargando tu colección...</p>
        </div>
      )}
      {/* Header */}
      <div style={{ background:t.surface,borderBottom:`1px solid ${t.border}`,padding:'14px 18px',position:'sticky',top:0,zIndex:50 }}>
        <div style={{ maxWidth:640,margin:'0 auto',display:'flex',alignItems:'center',justifyContent:'space-between' }}>
          <div>
            <h1 style={{ fontFamily:"'Playfair Display',serif",fontSize:22,fontWeight:700 }}>Mi Colección</h1>
            <p style={{ fontSize:12,color:t.text2,marginTop:1 }}>{items.length} objeto{items.length!==1?'s':''}</p>
          </div>
          <div style={{ display:'flex',gap:8,alignItems:'center' }}>
            {[['💾',() => setDataOpen(true)],['📊',() => setStatsOpen(true)],[dark?'☀️':'🌙',toggleDark]].map(([icon,fn],i) => (
              <button key={i} onClick={fn} style={{ background:t.bg2,border:`1.5px solid ${t.border}`,borderRadius:'50%',width:36,height:36,fontSize:16,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center' }}>{icon}</button>
            ))}
            <button onClick={() => { setEditItem({...EMPTY_ITEM}); setModal('form'); }}
              style={{ background:t.accent,color:'#fff',border:'none',borderRadius:22,padding:'8px 18px',fontWeight:700,fontSize:14,cursor:'pointer' }}>
              + Añadir
            </button>
          </div>
        </div>
      </div>

      <div style={{ maxWidth:640,margin:'0 auto',padding:'0 14px 100px' }}>

        {/* Tabs */}
        <div style={{ display:'flex',gap:8,padding:'14px 0 8px',overflowX:'auto',scrollbarWidth:'none' }}>
          {[['all','Todos','🗂️'],...Object.entries(CATEGORIES).map(([k,v])=>[k,v.label,v.icon])].map(([key,label,icon]) => {
            const active = tab===key;
            const accent = key==='all' ? t.accent : CATEGORIES[key]?.accent;
            return (
              <button key={key} onClick={() => { setTab(key); setFilterState('all'); setLibrosView('grid'); }}
                style={{ flexShrink:0,padding:'7px 13px',borderRadius:20,border:`2px solid ${active?accent:t.border}`,background:active?accent:t.surface,color:active?'#fff':t.text2,fontSize:13,fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',gap:5,transition:'all 0.2s' }}>
                {icon} {label}
              </button>
            );
          })}
        </div>

        {/* Libros sub-view toggle */}
        {tab==='libros' && (
          <div style={{ display:'flex',gap:8,marginBottom:8 }}>
            {[['grid','📋 Todos'],['sagas','📖 Sagas']].map(([v,lbl]) => (
              <button key={v} onClick={() => setLibrosView(v)}
                style={{ padding:'5px 14px',borderRadius:16,border:`1.5px solid ${librosView===v?CATEGORIES.libros.accent:t.border}`,background:librosView===v?CATEGORIES.libros.accent:t.surface,color:librosView===v?'#fff':t.text2,fontSize:12,fontWeight:600,cursor:'pointer' }}>
                {lbl}
              </button>
            ))}
          </div>
        )}

        {/* Search + filter (not shown in saga view) */}
        {librosView!=='sagas' && (
          <div style={{ display:'flex',gap:8,margin:'4px 0 14px' }}>
            <div style={{ flex:1,position:'relative' }}>
              <span style={{ position:'absolute',left:11,top:'50%',transform:'translateY(-50%)',fontSize:14 }}>🔍</span>
              <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Buscar..."
                style={{ width:'100%',padding:'9px 12px 9px 32px',borderRadius:12,border:`1.5px solid ${t.border}`,background:t.surface,color:t.text,fontSize:14,outline:'none' }} />
            </div>
            {stateOptions.length > 0 && (
              <select value={filterState} onChange={e => setFilterState(e.target.value)}
                style={{ padding:'9px 10px',borderRadius:12,border:`1.5px solid ${t.border}`,background:t.surface,color:t.text,fontSize:13,outline:'none',cursor:'pointer' }}>
                <option value="all">Todos</option>
                {stateOptions.map(s => <option key={s} value={s}>{s}</option>)}
              </select>
            )}
          </div>
        )}

        {/* Saga view */}
        {tab==='libros' && librosView==='sagas' ? (
          Object.keys(sagasMap).length===0 ? (
            <div style={{ textAlign:'center',padding:'60px 20px',color:t.text2 }}>
              <div style={{ fontSize:48,marginBottom:12 }}>📖</div>
              <p style={{ fontSize:16,fontWeight:600 }}>Sin sagas todavía</p>
              <p style={{ fontSize:13,marginTop:6 }}>Añade libros con saga asignada</p>
            </div>
          ) : (
            <div style={{ display:'flex',flexDirection:'column',gap:12 }}>
              {Object.entries(sagasMap).map(([sagaName,books]) => (
                <SagaCard key={sagaName} sagaName={sagaName} books={books} t={t} onOpen={name => setSagaModal(name)} />
              ))}
              {/* libros sin saga */}
              {items.filter(i => i.category==='libros' && !i.saga).length > 0 && (
                <div style={{ background:t.surface,border:`1.5px solid ${t.border}`,borderRadius:14,padding:14 }}>
                  <p style={{ fontWeight:700,fontSize:13,color:t.text2,marginBottom:8 }}>Sin saga ({items.filter(i=>i.category==='libros'&&!i.saga).length})</p>
                  <div style={{ display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(130px,1fr))',gap:10 }}>
                    {items.filter(i=>i.category==='libros'&&!i.saga).map(item => (
                      <ItemCard key={item.id} item={item} t={t}
                        onOpen={() => { setEditItem(item); setModal('detail'); }}
                        onToggleFav={() => toggleFav(item.id)} />
                    ))}
                  </div>
                </div>
              )}
            </div>
          )
        ) : (
          /* Normal grid */
          filtered.length===0 ? (
            <div style={{ textAlign:'center',padding:'60px 20px',color:t.text2 }}>
              <div style={{ fontSize:48,marginBottom:12 }}>{items.length===0?'📭':'🔎'}</div>
              <p style={{ fontSize:16,fontWeight:600 }}>{items.length===0?'Tu colección está vacía':'Sin resultados'}</p>
              <p style={{ fontSize:13,marginTop:6 }}>{items.length===0?'Pulsa + Añadir para empezar':'Prueba con otra búsqueda'}</p>
            </div>
          ) : (
            <div style={{ display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(148px,1fr))',gap:12 }}>
              {filtered.map(item => (
                <ItemCard key={item.id} item={item} t={t}
                  onOpen={() => { setEditItem(item); setModal('detail'); }}
                  onToggleFav={() => toggleFav(item.id)} />
              ))}
            </div>
          )
        )}
      </div>

      {/* Modals */}
      {modal==='form' && editItem && (
        <FormModal item={editItem} t={t} onSave={saveItem}
          onDelete={editItem.id ? () => deleteItem(editItem.id) : null}
          onClose={() => { setModal(null); setEditItem(null); }} />
      )}
      {modal==='detail' && editItem && (
        <DetailModal item={editItem} t={t}
          onEdit={() => setModal('form')}
          onToggleFav={() => { toggleFav(editItem.id); setEditItem(prev => ({...prev,favorite:!prev.favorite})); }}
          onClose={() => { setModal(null); setEditItem(null); }} />
      )}
      {sagaModal && (
        <SagaDetailModal sagaName={sagaModal} books={sagaBooks} t={t}
          onOpenBook={book => { setSagaModal(null); setEditItem(book); setModal('detail'); }}
          onClose={() => setSagaModal(null)} />
      )}
      {statsOpen && <StatsModal items={items} t={t} onClose={() => setStatsOpen(false)} />}
      {dataOpen  && <DataModal  items={items} t={t}
        onExcelExport={() => exportToExcel(items)}
        onJSONExport={() => exportToJSON(items)}
        onImport={f => importFromJSON(f, data => { setItems(data); setDataOpen(false); })}
        onClose={() => setDataOpen(false)} />}
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
